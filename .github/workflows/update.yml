name: Update Codex package

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-codex-package
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Update package inputs
        run: nix develop --command ./scripts/update.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- flake.nix flake.lock versions.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate update
        if: steps.changes.outputs.changed == 'true'
        run: nix flake check --print-build-logs

      - name: Commit update
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add flake.nix flake.lock versions.json
          git commit -m "Update Codex package inputs"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"

      - name: Report no-op
        if: steps.changes.outputs.changed == 'false'
        run: echo "Codex package inputs are already current."
